<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WinGo</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1a3a;
  color:white;
}

/* HEADER */
.header {
  background:#132b5c;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* CARD */
.card {
  margin:10px;
  padding:15px;
  background:#1c3b7a;
  border-radius:10px;
}

/* TIMER */
.timer {
  font-size:18px;
  margin-bottom:10px;
}

/* BALLS */
.balls {
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.ball {
  width:40px;
  height:40px;
  border-radius:50%;
  margin:5px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.green {background:#00c853;}
.red {background:#ff3d00;}
.violet {background:#aa00ff;}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-size:16px;
}

/* TABLE */
table {
  width:100%;
  margin-top:10px;
  font-size:14px;
}

td, th {
  padding:6px;
  text-align:center;
}
</style>

</head>

<body>

<div class="header">🎮 WinGo 30sec</div>

<div class="card">
  <div class="timer">⏱ Time: <span id="time">30</span>s</div>
  <div>Period: <span id="period"></span></div>

  <div id="balls" class="balls"></div>

  <button onclick="play()">PLAY</button>
</div>

<div class="card">
  <h3>Game History</h3>
  <table border="1">
    <tr>
      <th>Period</th>
      <th>Number</th>
      <th>Big/Small</th>
      <th>Color</th>
    </tr>
    <tbody id="history"></tbody>
  </table>
</div>

<script>
let time = 30;
let history = [];

function getColor(n){
  if(n==0 || n==5) return "violet";
  if(n%2==0) return "red";
  return "green";
}

function generatePeriod(){
  return Date.now();
}

function play(){
  let num = Math.floor(Math.random()*10);
  let color = getColor(num);
  let size = num>=5 ? "Big" : "Small";
  let period = generatePeriod();

  document.getElementById("period").innerText = period;

  // balls
  let html="";
  for(let i=0;i<5;i++){
    let r=Math.floor(Math.random()*10);
    html += `<div class="ball ${getColor(r)}">${r}</div>`;
  }
  document.getElementById("balls").innerHTML = html;

  // history
  history.unshift({period,num,size,color});
  if(history.length>10) history.pop();

  let table="";
  history.forEach(h=>{
    table += `
    <tr>
      <td>${h.period}</td>
      <td>${h.num}</td>
      <td>${h.size}</td>
      <td>${h.color}</td>
    </tr>`;
  });

  document.getElementById("history").innerHTML = table;
}

// timer auto
setInterval(()=>{
  time--;
  if(time<=0){
    play();
    time=30;
  }
  document.getElementById("time").innerText = time;
},1000);

// first run
play();
</script>

</body>
</html>
