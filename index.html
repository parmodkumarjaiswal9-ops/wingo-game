<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jalwa.Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:linear-gradient(180deg,#0a1633,#050d22);
  color:white;
}

/* HEADER */
.header{
  background:#0c1f4a;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

/* GAME MODES */
.modes{
  display:flex;
  gap:10px;
  padding:10px;
}

.mode{
  flex:1;
  background:#102b5c;
  padding:12px;
  border-radius:12px;
  text-align:center;
  opacity:0.6;
}

.active{
  background:linear-gradient(135deg,#3be0b0,#00c853);
  color:black;
  opacity:1;
}

/* TIMER BOX */
.topbox{
  margin:10px;
  padding:15px;
  border-radius:15px;
  background:linear-gradient(135deg,#3be0b0,#00c853);
  color:black;
}

.timerrow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.timebox{
  background:#0c1f4a;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  font-weight:bold;
  letter-spacing:2px;
}

/* COLOR BUTTONS */
.colors{
  display:flex;
  gap:10px;
  padding:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.violet{background:#9b59b6;}

/* BALL GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:12px;
  padding:10px;
}

.ball{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:20px;
  margin:auto;
  color:white;
  box-shadow: inset 0 4px 8px rgba(255,255,255,0.3),
              inset 0 -4px 8px rgba(0,0,0,0.4),
              0 4px 10px rgba(0,0,0,0.6);
}

/* BALL COLORS */
.ball.green{background:radial-gradient(circle,#4cff91,#1e8449);}
.ball.red{background:radial-gradient(circle,#ff6b6b,#922b21);}
.ball.violet{background:radial-gradient(circle,#d580ff,#5b2c6f);}

/* BIG SMALL */
.bigsmall{
  display:flex;
  margin:10px;
}

.big{
  flex:1;
  background:#d98c2e;
  padding:14px;
  text-align:center;
  border-radius:12px 0 0 12px;
}

.small{
  flex:1;
  background:#4a80d8;
  padding:14px;
  text-align:center;
  border-radius:0 12px 12px 0;
}

/* HISTORY */
.card{
  margin:10px;
  padding:10px;
  background:#102b5c;
  border-radius:12px;
}

table{
  width:100%;
  font-size:14px;
}

td,th{
  text-align:center;
  padding:6px;
}
</style>

</head>

<body>

<div class="header">Jalwa.Game</div>

<!-- MODES -->
<div class="modes">
  <div class="mode active">WinGo 30s</div>
  <div class="mode">1 Min</div>
  <div class="mode">3 Min</div>
  <div class="mode">5 Min</div>
</div>

<!-- TIMER -->
<div class="topbox">
  <div class="timerrow">
    <div>How to play</div>
    <div class="timebox" id="time">00:30</div>
  </div>
  <div style="margin-top:10px;">Period: <span id="period"></span></div>
</div>

<!-- COLORS -->
<div class="colors">
  <div class="btn green">Green</div>
  <div class="btn violet">Violet</div>
  <div class="btn red">Red</div>
</div>

<!-- BALL GRID -->
<div class="grid" id="grid"></div>

<!-- BIG SMALL -->
<div class="bigsmall">
  <div class="big">Big</div>
  <div class="small">Small</div>
</div>

<!-- HISTORY -->
<div class="card">
  <h3>Game History</h3>
  <table border="1">
    <tr>
      <th>Period</th>
      <th>Number</th>
      <th>Big/Small</th>
      <th>Color</th>
    </tr>
    <tbody id="history"></tbody>
  </table>
</div>

<script>
let time=30;
let history=[];

function getColor(n){
  if(n==0||n==5) return "violet";
  if(n%2==0) return "red";
  return "green";
}

function generatePeriod(){
  let d=new Date();
  return d.getFullYear()+
  String(d.getMonth()+1).padStart(2,'0')+
  String(d.getDate()).padStart(2,'0')+
  Math.floor(100000000+Math.random()*900000000);
}

function loadGrid(){
  let html="";
  for(let i=0;i<=9;i++){
    html+=`<div class="ball ${getColor(i)}">${i}</div>`;
  }
  document.getElementById("grid").innerHTML=html;
}

function play(){
  let num=Math.floor(Math.random()*10);
  let color=getColor(num);
  let size=num>=5?"Big":"Small";
  let period=generatePeriod();

  document.getElementById("period").innerText=period;

  history.unshift({period,num,size,color});
  if(history.length>10) history.pop();

  let table="";
  history.forEach(h=>{
    table+=`<tr>
    <td>${h.period}</td>
    <td>${h.num}</td>
    <td>${h.size}</td>
    <td>${h.color}</td>
    </tr>`;
  });

  document.getElementById("history").innerHTML=table;
}

/* TIMER */
setInterval(()=>{
  time--;
  if(time<=0){
    play();
    time=30;
  }
  let sec=String(time).padStart(2,'0');
  document.getElementById("time").innerText="00:"+sec;
},1000);

loadGrid();
play();
</script>

</body>
</html>
