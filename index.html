<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jalwa.Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="google13b7d6fe9f8aa12e" />

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#0b1a3a,#06122b);
  color:white;
}

.header{
  background:#0d1f4b;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* TOP BOX */
.topbox{
  margin:10px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(90deg,#2ee59d,#00c853);
  color:black;
}

.timerbox{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.time{
  font-size:24px;
  font-weight:bold;
}

/* COLOR BUTTONS */
.colors{
  display:flex;
  margin:10px;
  gap:10px;
}

.colors div{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}

.greenBtn{background:#28a745;}
.violetBtn{background:#6f42c1;}
.redBtn{background:#dc3545;}

/* BALL GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:10px;
  margin:10px;
}

.ball{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  color:white;
  margin:auto;
}

/* BALL COLORS */
.green{background:#28a745;}
.red{background:#dc3545;}
.violet{background:#6f42c1;}

/* BIG SMALL */
.bigsmall{
  display:flex;
  margin:10px;
}

.big{
  flex:1;
  background:#d98c2e;
  padding:12px;
  text-align:center;
  border-radius:10px 0 0 10px;
}

.small{
  flex:1;
  background:#4a80d8;
  padding:12px;
  text-align:center;
  border-radius:0 10px 10px 0;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  font-size:14px;
}

td,th{
  padding:6px;
  text-align:center;
}
</style>

</head>

<body>

<div class="header">Jalwa.Game</div>

<!-- TOP TIMER BOX -->
<div class="topbox">
  <div class="timerbox">
    <div>WinGo 30sec</div>
    <div class="time" id="time">30</div>
  </div>
  <div>Period: <span id="period"></span></div>
</div>

<!-- COLOR BUTTONS -->
<div class="colors">
  <div class="greenBtn">Green</div>
  <div class="violetBtn">Violet</div>
  <div class="redBtn">Red</div>
</div>

<!-- BALL GRID -->
<div class="grid" id="grid"></div>

<!-- BIG SMALL -->
<div class="bigsmall">
  <div class="big">Big</div>
  <div class="small">Small</div>
</div>

<!-- HISTORY -->
<div style="margin:10px;">
  <h3>Game History</h3>
  <table border="1">
    <tr>
      <th>Period</th>
      <th>Number</th>
      <th>Big/Small</th>
      <th>Color</th>
    </tr>
    <tbody id="history"></tbody>
  </table>
</div>

<script>
let time = 30;
let history = [];

function getColor(n){
  if(n==0 || n==5) return "violet";
  if(n%2==0) return "red";
  return "green";
}

function generatePeriod(){
  let now = new Date();
  let year = now.getFullYear();
  let month = String(now.getMonth()+1).padStart(2,'0');
  let day = String(now.getDate()).padStart(2,'0');
  let random = Math.floor(100000000 + Math.random()*900000000);
  return `${year}${month}${day}${random}`;
}

/* GRID BALLS */
function loadGrid(){
  let html="";
  for(let i=0;i<=9;i++){
    html += `<div class="ball ${getColor(i)}">${i}</div>`;
  }
  document.getElementById("grid").innerHTML = html;
}

/* PLAY */
function play(){
  let num = Math.floor(Math.random()*10);
  let color = getColor(num);
  let size = num>=5 ? "Big":"Small";
  let period = generatePeriod();

  document.getElementById("period").innerText = period;

  history.unshift({period,num,size,color});
  if(history.length>10) history.pop();

  let table="";
  history.forEach(h=>{
    table += `
    <tr>
      <td>${h.period}</td>
      <td>${h.num}</td>
      <td>${h.size}</td>
      <td>${h.color}</td>
    </tr>`;
  });

  document.getElementById("history").innerHTML = table;
}

/* TIMER */
setInterval(()=>{
  time--;
  if(time<=0){
    play();
    time=30;
  }
  document.getElementById("time").innerText = time;
},1000);

loadGrid();
play();
</script>

</body>
</html>
